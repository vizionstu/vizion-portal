<!DOCTYPE html>
<html lang="en" data-theme="monolith" data-density="regular" data-anim="on" data-accent="on" style="--font-display:'Oswald',sans-serif;--accent:#b9542f">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" href="logo.png" />
<title>VIZION STUDIO — Client Delivery Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Oswald:wght@200;300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- QR generation (graceful if unavailable) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

<!-- Firebase CDN (compat mode — no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<!-- Firebase config + init -->
<script src="firebase-config.js"></script>

<!-- Data layer (plain JS) -->
<script src="store.js"></script>

<!-- App (Babel) — order matters: ui → client → admin → main -->
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="client.jsx"></script>
<script type="text/babel" src="admin.jsx"></script>
<script type="text/babel" src="main.jsx"></script>
</body>
</html>
